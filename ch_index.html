<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Lookup</title>
  <link rel="stylesheet" href="ch_style.css">
</head>
<body>

<div class="page-shell">
  <h1 class="page-title">チャンネル検索</h1>

  <!-- 入力エリア：検索前はここだけが見える状態です -->
  <div class="input-box">
    <input id="ytInput" type="text" placeholder="URLまたはチャンネル名を入力">
    <button id="ytSearchBtn">検索する</button>
  </div>

  <!-- 
    ★重要ポイント
    検索結果（名前、切り替えボタン、ソート、表）はすべて、
    JavaScriptがこの「resultArea」の中に順番通りに組み立てて表示します。
  -->
  <div id="resultArea"></div>
</div>

<!-- 以前お送りした「renderResult」関数が入ったJSファイルを読み込みます -->
<script src="ch_script.js"></script>
</body>
</html>
