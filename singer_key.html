<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌い手楽曲検索</title>
    <link rel="stylesheet" href="sn_style.css">
</head>
<body>
    <div class="page-shell">
        <h1 class="page-title">歌い手楽曲検索</h1>
        
        <!-- 入力エリア -->
        <div class="input-box">
            <input type="text" id="urlInput" placeholder="URLまたはハンドル(@...)を入力">
            <button id="searchBtn">検索</button>
        </div>

        <div id="loading" style="display:none; text-align:center; padding:20px;">データを取得中...</div>

        <div id="resultArea" style="display:none;">
            <!-- チャンネル情報表示ボックス -->
            <div class="channel-name-box">
                <span class="channel-label">チャンネル</span>
                <p id="singerNameDisplay" class="channel-name"></p>
                <div style="margin-top: 10px;">
                    <span class="channel-label">チャンネル名</span>
                    <p id="channelNameDisplay" class="channel-name"></p>
                </div>
            </div>

            <!-- 切り替えタブ（ラジオボタン風） -->
            <div class="video-type-box">
                <label>
                    <input type="radio" name="videoMode" value="normal" checked>
                    <span>横動画</span>
                </label>
                <label>
                    <input type="radio" name="videoMode" value="shorts">
                    <span>ショート</span>
                </label>
            </div>

            <!-- 結果リスト（カード形式） -->
            <div class="card-block">
                <div class="table-head">
                    <div class="table-col col-main">曲名 / チャンネル</div>
                    <div class="table-col col-sub">Key / 視聴</div>
                </div>
                <div id="tableBody"></div>
            </div>
        </div>
    </div>
    <script src="sn_script.js"></script>
</body>
</html>
